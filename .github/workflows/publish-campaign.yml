name: Publish Deloitte candidate campaign

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-campaign.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct verified campaign package
        shell: bash
        run: |
          set -euo pipefail
          cat .publish/payload-{00..11} > /tmp/prefix.b64
          cat .publish/hex-{00..07} > /tmp/remainder.hex
          python - <<'PY'
          from pathlib import Path
          prefix = Path('/tmp/prefix.b64').read_bytes()
          remainder = bytes.fromhex(Path('/tmp/remainder.hex').read_text())
          Path('/tmp/campaign.b64').write_bytes(prefix + remainder)
          PY
          base64 --decode /tmp/campaign.b64 > /tmp/campaign.tar.gz
          echo '69994eac3b2bcf4a03616d35f303b1d932903d4f3c746410beab2376e32205ff  /tmp/campaign.tar.gz' | sha256sum -c -
          tar -xzf /tmp/campaign.tar.gz
          rm -rf .publish
          rm -f publication-staging-note.txt
          rm -f .github/workflows/publish-campaign.yml

      - name: Commit complete public campaign
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete Deloitte FDE candidate campaign'
          git push origin HEAD:main
